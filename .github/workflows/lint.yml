name: Lint

on:
  push:
    paths:
      - '**/*.md'
      - 'scripts/lint.py'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.md'
      - 'scripts/lint.py'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Documentation prose gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run linter
        run: python scripts/lint.py --check --verbose

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint_report.json
          retention-days: 30
